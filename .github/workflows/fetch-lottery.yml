name: Fetch Lottery Results Daily

on:
  # Chạy mỗi ngày lúc 11:45 UTC = 18:45 giờ VN (sau khi xổ số quay xong)
  schedule:
    - cron: '45 11 * * *'
  # Cho phép chạy thủ công từ UI GitHub
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to fetch (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''
      region:
        description: 'Region (south|central|north|all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - south
          - central
          - north

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run fetch scripts
        run: |
          DATE="${{ github.event.inputs.date }}"
          REGION="${{ github.event.inputs.region }}"
          REGION="${REGION:-all}"

          if [ -z "$DATE" ]; then
            DATE_ARG=""
          else
            DATE_ARG="$DATE"
          fi

          # Nếu region = all thì chạy cho south + central (north chưa hỗ trợ đầy đủ)
          if [ "$REGION" = "all" ]; then
            node scripts/fetch.js "${DATE_ARG:-today}" south || echo "South fetch failed"
            node scripts/fetch.js "${DATE_ARG:-today}" central || echo "Central fetch failed"
          else
            node scripts/fetch.js "${DATE_ARG:-today}" "$REGION"
          fi

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update lottery results $(date -u +%Y-%m-%d)"
            git push
          fi
